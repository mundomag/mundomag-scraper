name: Reporte diario 3I/ATLAS

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
jobs:
  generar-reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper de 3I/ATLAS
        run: python scripts/fetch_3iatlas.py

      - name: Generar mapa del sistema solar
        run: python scripts/generate_map.py

      - name: Commitear el nuevo reporte y mapa
        run: |
          git config user.name "mundomag-bot"
          git config user.email "bot@mundomag.fyi"
          git add reportes/ mapas/
          git diff --staged --quiet || git commit -m "Reporte y mapa automatico 3I/ATLAS $(date -u +'%Y-%m-%d')"
          git push
